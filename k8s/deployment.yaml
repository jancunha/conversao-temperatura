apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversaotemperatura
  namespace: producao
spec:
  replicas: 3
  selector:
    matchLabels:
      app: conversaotemperatura
  template:
    metadata:
      labels:
        app: conversaotemperatura
    spec:
      containers:
      - name: conversao
        image: jancunha/conversao-temperatura:v1
        ports:
          - name: http
            containerPort: 8080
            protocol: TCP
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "500m"
            memory: 512Mi
      imagePullSecrets:
      - name: docker-auth
---
apiVersion: v1
kind: Service
metadata:
  name: conversaotemperatura
  namespace: producao
spec:
  selector:
    app: conversaotemperatura
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
      nodePort: 30000